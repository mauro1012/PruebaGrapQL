name: Build Auditoria Service

on:
  push:
    paths:
      - 'auditoria/**' # Se activa solo si cambias algo en la lógica de S3/Auditoría

jobs:
  push_to_registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./auditoria
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-auditoria:latest